<!DOCTYPE html>
<html>
<head>
<title>HTML Form Elements and Tag Practice</title>

<style>
body{
    background-color: lightblue;
    font-family: Arial;
}

.container{
    background-color: white;
    width: 700px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
}

div{
    margin-bottom: 15px;
}
</style>

</head>

<body>

<div class="container">

<h1>HTML Form Elements and Tag Practice</h1>

<form>

<div>
<label>Name:</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div>
<label>Password:</label>
<input type="password" placeholder="Enter password" required>
</div>

<div>
<label>Email:</label>
<input type="email" placeholder="Enter email" required>
</div>

<div>
<label>Phone:</label>
<input type="tel" placeholder="Enter mobile number" required>
</div>

<div>
<label>Website:</label>
<input type="url" placeholder="Enter website URL" required>
</div>

<div>
<label>Date:</label>
<input type="date" required>
</div>

<div>
<label>Date and Time:</label>
<input type="datetime-local" required>
</div>

<div>
<label>Favorite Color:</label>
<input type="color">
</div>

<div>
<label>Satisfaction Level:</label>
<input type="range">
</div>

<div>
<label>Gender:</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>

<div>
<label>Skills:</label>
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> JavaScript
</div>

<div>
<label>Upload File:</label>
<input type="file">
</div>

<div>
<span style="color:blue;">Inline Element Example</span>
</div>

<div>
<p>Block Level Element Example</p>
</div>

<div>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</div>

</form>

</div>

</body>
</html>
